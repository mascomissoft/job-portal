<main class="auth-container">
  <div class="auth-box">
    <h2>Create Account</h2>
    <p>Get started with Masco Job Portal today</p>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="registerData.name" name="name" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="registerData.email" name="email" placeholder="name@company.com" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="registerData.password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-auth">Register</button>
    </form>

    <p class="auth-redirect">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</main>
