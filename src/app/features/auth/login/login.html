<main class="auth-container">
  <div class="auth-box">
    <h2>Welcome Back</h2>
    <p>Login to access your Masco Job Portal account</p>

    <form (ngSubmit)="handleLogin()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="loginData.email" name="email" placeholder="enter your email" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="••••••••" required />
      </div>

      <!-- <button type="submit" class="btn-auth">Sign In</button> -->
      <app-ui-button 
        text="Sign In" 
        variant="primary" 
        [fullWidth]="true"
        type="submit">
      </app-ui-button>
      
    </form>

    <p class="auth-redirect">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
  </main>
